<!DOCTYPE html>
<html lang="ko">

<head>

	<meta charset="UTF-8">

	<title>WordCloud Test</title>

	<link rel="preconnect"
		  href="https://fonts.googleapis.com">

	<link rel="preconnect"
		  href="https://fonts.gstatic.com"
		  crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&display=swap"
		  rel="stylesheet">

	<link rel="stylesheet"
		  href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css">

	<style>

		body {

			font-family: 'BBH Bartle', sans-serif;

			text-align: center;
		}

		canvas {

			border: 1px solid #ccc;

			margin-top: 20px;
		}

		.select-area {

			margin: 20px;
		}

		#playerSelect {

			width: 260px;
		}

	</style>

</head>

<body>

	<h1>25TEST Player WordCloud</h1>

	<div class="select-area">

		<select id="playerSelect"
				onchange="changePlayer()">

			<option value="">선수 선택</option>

		</select>

	</div>

	<canvas id="wordcloud"
			width="1000"
			height="800">
	</canvas>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js">
	</script>

	<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js">
	</script>

	<script>

		let allData = [];

		async function loadCSV() {

			const response =
				await fetch('./25test.csv');

			const text =
				await response.text();

			const lines =
				text.trim().split('\n');

			const rows =
				lines.slice(1);

			allData = [];

			rows.forEach(line => {

				const cols =
					line.split(',');

				allData.push({

					league: cols[0],

					year: cols[1],

					split: cols[2],

					date: cols[3],

					patch: cols[4],

					position: cols[5],

					playername: cols[6],

					champion: cols[7],

					result: Number(cols[8])
				});
			});

			createPlayerOptions();

			initializeTomSelect();

			clearCanvas();
		}

		function createPlayerOptions() {

			const select =
				document.getElementById('playerSelect');

			const players = [
				...new Set(
					allData
						.filter(item =>
							item.position !== 'team'
							&& item.playername
						)
						.map(item =>
							item.playername
						)
				)
			];

			players.sort();

			players.forEach(player => {

				const option =
					document.createElement('option');

				option.value =
					player;

				option.textContent =
					player;

				select.appendChild(option);
			});
		}

		function initializeTomSelect() {

			new TomSelect(
				'#playerSelect',
				{

					create: false,

					searchField: ['text'],

					sortField: {

						field: 'text',

						direction: 'asc'
					}
				}
			);
		}

		function changePlayer() {

			const player =
				document.getElementById('playerSelect').value;

			if (!player) {

				clearCanvas();

				return;
			}

			const filtered =
				allData.filter(item =>
					item.position !== 'team'
					&& item.playername === player
				);

			renderChampionWordCloud(filtered);
		}

		function renderChampionWordCloud(data) {

			clearCanvas();

			const championStats = {};

			data.forEach(item => {

				if (!item.champion) {

					return;
				}

				if (!championStats[item.champion]) {

					championStats[item.champion] = {

						picks: 0,

						wins: 0
					};
				}

				championStats[item.champion].picks++;

				if (item.result === 1) {

					championStats[item.champion].wins++;
				}
			});

			const maxPicks =
				Math.max(
					...Object.values(championStats)
						.map(stat => stat.picks)
				);

			const maxFontSize =
				99;

			const minFontSize =
				1;

			const words =
				Object.entries(championStats)
					.map(([champion, stat]) => {

						const normalizedSize =
							minFontSize
							+ (stat.picks / maxPicks)
							* (maxFontSize - minFontSize);

						return [
							champion,
							normalizedSize
						];
					});

			const colors = {};

			Object.entries(championStats)
				.forEach(([champion, stat]) => {

					const winRate =
						stat.wins / stat.picks;

					if (winRate >= 0.7) {

						colors[champion] =
							'#FF6B6B';

					} else if (winRate >= 0.5) {

						colors[champion] =
							'#4ECDC4';

					} else {

						colors[champion] =
							'#999999';
					}
				});

			WordCloud(
				document.getElementById('wordcloud'),
				{

					list: words,

					gridSize: 10,

					weightFactor: 1,

					rotateRatio: 0,

					backgroundColor: '#ffffff',

					fontFamily:
						'"BBH Bartle", sans-serif',

					color: function(word) {

						return colors[word]
							|| '#000000';
					}
				}
			);
		}

		function clearCanvas() {

			const canvas =
				document.getElementById('wordcloud');

			const ctx =
				canvas.getContext('2d');

			ctx.clearRect(
				0,
				0,
				canvas.width,
				canvas.height
			);
		}

		loadCSV();

	</script>

</body>

</html>
