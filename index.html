<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WordCloud JSON Test</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'BBH Bartle', sans-serif;
            text-align: center;
        }

        canvas {
            border: 1px solid #ccc;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>워드클라우드 JSON 테스트</h1>

    <canvas id="wordcloud" width="1000" height="800"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>

    <script>

        async function loadCSV() {

            // CSV 파일 읽기
            const response = await fetch('./words.csv');

            // 텍스트 형태로 변환
            const text = await response.text();

            // 줄 단위로 나누기
            const lines = text.trim().split('\n');

            // 첫 줄(header) 제거
            const rows = lines.slice(1);

            // 데이터 저장용
            const data = [];

            rows.forEach(line => {

                const cols = line.split(',');

                data.push({
                    name: cols[0],
                    count: Number(cols[1]),
                    color: cols[2],
                    group: cols[3],
                    image: cols[4]
                });
            });

            console.log(data);

            // 워드클라우드용 배열 생성
            const words = data.map(item => [
                item.name,
                item.count
            ]);

            // 색상 저장
            const colors = {};

            data.forEach(item => {
                colors[item.name] = item.color;
            });

            // 워드클라우드 생성
            WordCloud(document.getElementById('wordcloud'), {

                list: words,

                gridSize: 8,

                weightFactor: 1,

                rotateRatio: 0,

                backgroundColor: '#ffffff',

                fontFamily: '"BBH Bartle", sans-serif',

                color: function(word) {
                    return colors[word] || '#000000';
                }
            });
        }

        // 실행
        loadCSV();

    </script>

</body>
</html>
