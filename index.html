<!DOCTYPE html>
<html lang="ko">

<head>

	<meta charset="UTF-8">

	<title>Player WordCloud</title>

	<link rel="preconnect"
		  href="https://fonts.googleapis.com">

	<link rel="preconnect"
		  href="https://fonts.gstatic.com"
		  crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&family=Bebas+Neue&display=swap"
		  rel="stylesheet">

	<link rel="stylesheet"
		  href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css">

	<link rel="stylesheet" href="./style.css">

</head>

<body>

	<h1>Archive Player WordCloud</h1>

	<div class="select-area">

		<select id="playerSelect"
				onchange="changePlayer()">

			<option value="">Choose Player</option>

		</select>

	</div>

	<div id="filterArea">

		<div>

			<h3>Season</h3>

			<div id="seasonCheckboxes" class="filter-group"></div>

		</div>

		<div>

			<h3>League</h3>

			<div id="leagueCheckboxes" class="filter-group"></div>

		</div>

	</div>

	<div id="mainLayout">

		<section id="infoPanel">

			<div id="mostWinsArea">

				<h2>Most Wins</h2>

				<div id="mostWinsList"></div>

			</div>

			<div id="playerSection">

				<div id="playerInfo">

					<div id="playerRecord"></div>

					<div id="playerName"></div>

					<div id="playerCareer"></div>

				</div>

				<div id="playerImageArea">

					<img id="playerImage"
						src=""
						alt="player"
						style="display:none;">

				</div>

			</div>

		</section>

		<section id="cloudPanel">

			<canvas id="wordcloud"
					width="1000"
					height="800">
			</canvas>

		</section>

	</div>

	<div id="gameDetail"></div>

	<div id="tooltip"></div>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js">
	</script>

	<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js">
	</script>

	<script src="./script.js"></script>

</body>

</html>
