<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WordCloud</title>
</head>
<body>
    <h1>워드클라우드</h1>
    <canvas id="wordcloud" width="800" height="600"></canvas>

    <!-- 같은 폴더의 wordcloud2.js 사용 -->
    <script src="./wordcloud2.js"></script>
    
    <script>
        const canvas = document.getElementById('wordcloud');
        const words = [
            ['Hello', 100],
            ['World', 80],
            ['JavaScript', 70],
        ];

        WordCloud(canvas, {
            list: words,
            gridSize: 8,
            color: 'red'
        });
    </script>
</body>
</html>
