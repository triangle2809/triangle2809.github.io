<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WordCloud</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&display=swap" rel="stylesheet">
</head>
<body>
    <h1>워드클라우드</h1>
    <canvas id="wordcloud" width="1000" height="800"></canvas>

    <script src="./wordcloud2.js"></script>
    
    <script>
        const canvas = document.getElementById('wordcloud');
        const words = [
            ['Hello', 100],
            ['World', 80],
            ['JS', 70],
        ];

        const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1'];
        
        WordCloud(canvas, {
            list: words,
            gridSize: 8,
            color: function(word, weight, fontSize, distance, theta, index) {
                return colors[index % colors.length];
            },
            fontFamily: 'BBH Bartle',
            weightFactor: 1.5,
            rotateRatio: 0
        });
    </script>
</body>
</html>
